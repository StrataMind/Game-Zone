<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Evolution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #000814 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00f5ff;
        }
        #container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.4);
        }
        canvas {
            border: 3px solid #00f5ff;
            border-radius: 10px;
            background: #000;
            display: block;
            margin: 20px auto;
        }
        #score, #lines { font-size: 24px; margin: 10px; text-shadow: 0 0 10px #00f5ff; }
        button {
            background: #00f5ff;
            color: #000814;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover { background: #06ffa5; transform: scale(1.05); }
        #gameOver {
            display: none;
            font-size: 36px;
            color: #ff006e;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>🎮 TETRIS EVOLUTION</h1>
        <div id="score">Score: 0</div>
        <div id="lines">Lines: 0</div>
        <canvas id="tetris" width="300" height="600"></canvas>
        <div id="gameOver">GAME OVER</div>
        <button onclick="startGame()">Start Game</button>
        <button onclick="location.href='../../index.html'">Back</button>
        <p style="margin-top: 15px; font-size: 14px;">← → Move | ↓ Drop | ↑ Rotate</p>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 30;
        
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0;
        let lines = 0;
        let gameRunning = false;
        let dropInterval;
        
        const SHAPES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[1,0,0],[1,1,1]], // L
            [[0,0,1],[1,1,1]], // J
            [[0,1,1],[1,1,0]], // S
            [[1,1,0],[0,1,1]]  // Z
        ];
        
        const COLORS = ['#00f5ff', '#ffbe0b', '#ff006e', '#06ffa5', '#8338ec', '#fb5607', '#3a86ff'];
        
        let currentPiece = { shape: [], color: '', x: 0, y: 0 };
        
        function newPiece() {
            const index = Math.floor(Math.random() * SHAPES.length);
            currentPiece = {
                shape: SHAPES[index],
                color: COLORS[index],
                x: Math.floor(COLS / 2) - 1,
                y: 0
            };
            
            if (collision()) {
                gameRunning = false;
                document.getElementById('gameOver').style.display = 'block';
                clearInterval(dropInterval);
            }
        }
        
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
        
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(x, y, board[y][x]);
                    }
                }
            }
            
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        drawBlock(currentPiece.x + dx, currentPiece.y + dy, currentPiece.color);
                    }
                });
            });
        }
        
        function collision() {
            return currentPiece.shape.some((row, dy) => {
                return row.some((value, dx) => {
                    if (!value) return false;
                    const newX = currentPiece.x + dx;
                    const newY = currentPiece.y + dy;
                    return newX < 0 || newX >= COLS || newY >= ROWS || 
                           (newY >= 0 && board[newY][newX]);
                });
            });
        }
        
        function merge() {
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        board[currentPiece.y + dy][currentPiece.x + dx] = currentPiece.color;
                    }
                });
            });
        }
        
        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * linesCleared;
                document.getElementById('score').textContent = `Score: ${score}`;
                document.getElementById('lines').textContent = `Lines: ${lines}`;
            }
        }
        
        function rotate() {
            const rotated = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );
            const prev = currentPiece.shape;
            currentPiece.shape = rotated;
            if (collision()) currentPiece.shape = prev;
        }
        
        function move(dir) {
            currentPiece.x += dir;
            if (collision()) currentPiece.x -= dir;
        }
        
        function drop() {
            currentPiece.y++;
            if (collision()) {
                currentPiece.y--;
                merge();
                clearLines();
                newPiece();
            }
        }
        
        function hardDrop() {
            while (!collision()) {
                currentPiece.y++;
            }
            currentPiece.y--;
            merge();
            clearLines();
            newPiece();
        }
        
        function gameLoop() {
            if (gameRunning) {
                drawBoard();
            }
        }
        
        function startGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            gameRunning = true;
            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('lines').textContent = 'Lines: 0';
            document.getElementById('gameOver').style.display = 'none';
            
            newPiece();
            clearInterval(dropInterval);
            dropInterval = setInterval(drop, 800);
            setInterval(gameLoop, 50);
        }
        
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') move(-1);
            if (e.key === 'ArrowRight') move(1);
            if (e.key === 'ArrowDown') drop();
            if (e.key === 'ArrowUp') rotate();
            if (e.key === ' ') { e.preventDefault(); hardDrop(); }
        });
    </script>
</body>
</html>
