<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders Reborn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00ff88;
        }
        #gameContainer {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        canvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #000;
            display: block;
            margin: 20px auto;
        }
        #score, #lives, #level {
            font-size: 24px;
            margin: 10px;
            text-shadow: 0 0 10px #00ff88;
        }
        #gameOver {
            display: none;
            font-size: 48px;
            color: #ff006e;
            text-shadow: 0 0 20px #ff006e;
            margin: 20px;
        }
        button {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #00ccff;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ccff;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>🚀 SPACE INVADERS REBORN 👾</h1>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameOver">GAME OVER</div>
        <button id="startBtn" onclick="startGame()">Start Game</button>
        <button onclick="location.href='../../index.html'">Back to GameZone</button>
        <p style="margin-top: 20px; font-size: 14px;">Controls: Arrow Keys or A/D to move, Space to shoot</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 30,
            speed: 5
        };
        
        let bullets = [];
        let aliens = [];
        let alienBullets = [];
        let keys = {};
        
        function createAliens() {
            aliens = [];
            const rows = 3 + level;
            const cols = 8;
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    aliens.push({
                        x: col * 80 + 60,
                        y: row * 60 + 50,
                        width: 40,
                        height: 30,
                        alive: true
                    });
                }
            }
        }
        
        function drawPlayer() {
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#00ccff';
            ctx.fillRect(player.x + 20, player.y - 10, 10, 10);
        }
        
        function drawAliens() {
            aliens.forEach(alien => {
                if (alien.alive) {
                    ctx.fillStyle = '#ff006e';
                    ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
                    ctx.fillStyle = '#ffbe0b';
                    ctx.fillRect(alien.x + 10, alien.y + 10, 8, 8);
                    ctx.fillRect(alien.x + 22, alien.y + 10, 8, 8);
                }
            });
        }
        
        function drawBullets() {
            ctx.fillStyle = '#00ccff';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });
            
            ctx.fillStyle = '#ff006e';
            alienBullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 4, 15);
            });
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if ((keys['ArrowLeft'] || keys['a']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['d']) && player.x < canvas.width - player.width) player.x += player.speed;
            
            bullets = bullets.filter(bullet => {
                bullet.y -= 7;
                return bullet.y > 0;
            });
            
            alienBullets = alienBullets.filter(bullet => {
                bullet.y += 5;
                return bullet.y < canvas.height;
            });
            
            let moveDown = false;
            aliens.forEach(alien => {
                if (alien.alive) {
                    alien.x += 0.5 + level * 0.2;
                    if (alien.x > canvas.width - 50 || alien.x < 0) moveDown = true;
                }
            });
            
            if (moveDown) {
                aliens.forEach(alien => {
                    alien.y += 20;
                    alien.x = alien.x > canvas.width / 2 ? alien.x - 10 : alien.x + 10;
                });
            }
            
            if (Math.random() < 0.01) {
                const aliveAliens = aliens.filter(a => a.alive);
                if (aliveAliens.length > 0) {
                    const shooter = aliveAliens[Math.floor(Math.random() * aliveAliens.length)];
                    alienBullets.push({ x: shooter.x + 18, y: shooter.y + 30 });
                }
            }
            
            bullets.forEach((bullet, bIndex) => {
                aliens.forEach(alien => {
                    if (alien.alive && 
                        bullet.x > alien.x && bullet.x < alien.x + alien.width &&
                        bullet.y > alien.y && bullet.y < alien.y + alien.height) {
                        alien.alive = false;
                        bullets.splice(bIndex, 1);
                        score += 10;
                        document.getElementById('score').textContent = 'Score: ' + score;
                    }
                });
            });
            
            alienBullets.forEach((bullet, index) => {
                if (bullet.x > player.x && bullet.x < player.x + player.width &&
                    bullet.y > player.y && bullet.y < player.y + player.height) {
                    lives--;
                    alienBullets.splice(index, 1);
                    document.getElementById('lives').textContent = 'Lives: ' + lives;
                    if (lives <= 0) endGame();
                }
            });
            
            if (aliens.every(alien => !alien.alive)) {
                level++;
                document.getElementById('level').textContent = 'Level: ' + level;
                createAliens();
            }
            
            if (aliens.some(alien => alien.alive && alien.y > canvas.height - 100)) {
                endGame();
            }
            
            drawPlayer();
            drawAliens();
            drawBullets();
            
            requestAnimationFrame(updateGame);
        }
        
        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            level = 1;
            bullets = [];
            alienBullets = [];
            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('lives').textContent = 'Lives: 3';
            document.getElementById('level').textContent = 'Level: 1';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = 'Restart';
            createAliens();
            updateGame();
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && gameRunning) {
                e.preventDefault();
                bullets.push({ x: player.x + 23, y: player.y });
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
    </script>
</body>
</html>
